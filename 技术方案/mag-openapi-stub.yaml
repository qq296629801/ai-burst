# 多 Agent REST 草案（与 多Agent协作技术方案.md §9 对齐）
# 实现期：可合并进 springdoc 生成结果，或复制路径到正式 openapi
openapi: 3.0.3
info:
  title: AI Burst — MAG API (stub)
  version: 0.1.0
servers:
  - url: http://localhost:8080
tags:
  - name: mag-project
  - name: mag-task
paths:
  /api/mag/projects:
    get:
      tags: [mag-project]
      summary: 项目列表
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ApiResult — data 含 list + total
    post:
      tags: [mag-project]
      summary: 创建项目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagProjectCreate'
      responses:
        '200':
          description: OK
  /api/mag/projects/{id}:
    get:
      tags: [mag-project]
      summary: 项目详情
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: OK
        '404':
          description: MAG_NOT_FOUND
  /api/mag/projects/{id}/tasks/dispatch:
    post:
      tags: [mag-task]
      summary: 项目经理派工 — 创建任务并指定执行 Agent（权限 mag:task:dispatch）
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: OK — data 为任务行
        '409':
          description: 状态或数据不允许 — MAG_TASK_STATE_INVALID 等
  /api/mag/tasks/{id}/pm-reassign:
    post:
      tags: [mag-task]
      summary: 项目经理改派执行 Agent（PENDING / IN_PROGRESS / BLOCKED）
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK
        '409':
          description: 状态不允许 — MAG_TASK_STATE_INVALID
  /api/mag/tasks/{id}/flow-events:
    get:
      tags: [mag-task]
      summary: 任务流程事件（时间线/可视化；权限 mag:project:list）
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK — data 为事件数组（eventType、actorType、summary、detailJson 等）
  /api/mag/tasks/{id}/execution-logs:
    get:
      tags: [mag-task]
      summary: 任务 Agent 编排执行记录（成功/失败/触发被拒；权限 mag:project:list）
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK — data 含 executionOutcome、resultSummary、orchestrationRunId、workflowId、startedAt、finishedAt 等
  /api/mag/tasks/{id}/submit-complete:
    post:
      tags: [mag-task]
      summary: 申报完成 — 进行中 → 已完成（DONE）
      description: >
        将进行中任务标记为已完成。系统也可在编排成功且编排最终回复非空时自动等价调用（可配置），本接口为显式人工/API 入口。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
        '409':
          description: 状态不允许 / 乐观锁冲突 — 见 §19.7
components:
  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PageNum:
      name: pageNum
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
  schemas:
    ApiResultVoid:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          nullable: true
    MagProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 128
