spring:
  application:
    name: ai-burst-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ai_burst?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 296629801
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 127.0.0.1
    port: 6379
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.aiburst.entity,com.aiburst.llm.entity
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler

pagehelper:
  helper-dialect: mysql
  reasonable: true

server:
  port: 8080
  servlet:
    context-path: /

aiburst:
  jwt:
    secret: "ai-burst-change-this-secret-key-at-least-32-chars!!"
    expire-minutes: 120
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  llm:
    crypto:
      # 用于加密存储通道 API Key；生产请改为环境变量或 KMS
      secret: "ai-burst-llm-crypto-change-me-in-prod-32b!!"

logging:
  level:
    com.aiburst.mapper: debug
