spring:
  application:
    name: ai-burst-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ai_burst?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 296629801
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 127.0.0.1
    port: 6379
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.aiburst.entity,com.aiburst.llm.entity,com.aiburst.mag.entity
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler

pagehelper:
  helper-dialect: mysql
  reasonable: true

server:
  port: 8080
  servlet:
    context-path: /

aiburst:
  mag:
    agentscope:
      max-iters: 4
      pm-max-iters: 10
      call-timeout-seconds: 1200
      # AgentScope 会话落盘目录：按 p{projectId}/a{agentId} 隔离，禁止跨项目复用
      session-root: ${java.io.tmpdir}/mag-agent-sessions
      a2a-max-depth: 5
      # 根级 Agent 编排单线程 FIFO 排队依次执行（嵌套 A2A 不入队）；多 Worker 进程时每个进程各有一条队列
      serial-agent-run: true
      serial-queue-timeout-seconds: 6000
    mcp:
      enabled: false
      # 启用后通过 SSE 连接 MCP Server，工具并入各职能 Agent 的 Toolkit（由大模型调度）
      sse-url: ""
    skills:
      enabled: true
      classpath-root: mag-skills
    task:
      # 派工（及「待处理」态改派）后自动提交执行 Agent 编排，编排受理成功后将任务置为进行中
      auto-start-on-dispatch: true
      # 申报完成进入待核查后，自动进入核查中并触发 VERIFY Agent 编排（无 VERIFY Agent 时仅告警，可人工核查）
      auto-verify-on-submit-complete: true
      # 关联任务的执行方 Agent 编排成功且本次时间窗内已有 mag_agent_improvement_log 时，自动申报完成（进入待核查）；关闭后仅可手动申报
      auto-submit-complete-on-orchestration-success: true
      # 核查 PASS 结项后自动拉起项目经理 Agent 复盘全项目任务/模块；PM 可继续派工，链式重复直至阶段闭环
      auto-pm-review-after-verified-pass: true
      # 当项目内全部任务均为已完成时写入告警（INFO），提示用户需再派发新任务
      notify-when-all-tasks-done: true
    ws:
      # 新告警落库后向订阅了 project:{id} 的 WebSocket 客户端推送 mag.alert.new
      alert-broadcast: true
    temporal:
      # 已开启：触发「Agent/线程编排」会探测 127.0.0.1:7233；请先执行 docker compose -f docker-compose.temporal.yml up -d
      enabled: true
      target: "127.0.0.1:7233"
      namespace: default
      task-queue: mag-orchestration
      # Agent/线程 Workflow 内 Activity 的 StartToClose（分钟）；过短易出现 activity timed out / NOT_FOUND
      activity-start-to-close-minutes: 30
  jwt:
    secret: "ai-burst-change-this-secret-key-at-least-32-chars!!"
    expire-minutes: 120
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  llm:
    crypto:
      # 用于加密存储通道 API Key；生产请改为环境变量或 KMS
      secret: "ai-burst-llm-crypto-change-me-in-prod-32b!!"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.aiburst.mapper: debug
